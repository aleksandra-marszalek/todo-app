# Server
server.port=${PORT:8080}
server.url=${SERVER_URL:http://localhost:8080}

# Database - uses env vars in production, defaults for local dev
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tododb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# JWT Configuration - MUST be set via env vars in production
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.marszalek.todo=INFO